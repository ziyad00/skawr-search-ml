# SKAWR Search ML - Model Configuration

model:
  # Model architecture
  model_type: "skawr_transformer"
  vocab_size: 30000  # Will be determined from data
  hidden_size: 512
  num_attention_heads: 8
  num_hidden_layers: 6
  intermediate_size: 2048
  max_position_embeddings: 512

  # Task-specific heads
  embedding_dim: 512  # Output embedding dimension
  num_domains: 4  # automotive, electronics, fashion, general
  num_specificity_levels: 3  # generic, moderate, specific

  # Regularization
  hidden_dropout_prob: 0.1
  attention_probs_dropout_prob: 0.1
  layer_norm_eps: 1e-12

  # Special tokens
  pad_token_id: 0
  cls_token_id: 1
  sep_token_id: 2
  mask_token_id: 3

training:
  # Basic training parameters
  batch_size: 32
  learning_rate: 5e-5
  num_epochs: 3
  warmup_steps: 1000
  max_grad_norm: 1.0

  # Multi-task learning weights
  task_weights:
    masked_lm: 1.0
    domain_classification: 0.5
    specificity_prediction: 0.5
    contrastive_learning: 1.0

  # Optimizer
  optimizer: "adamw"
  weight_decay: 0.01
  adam_epsilon: 1e-8

  # Learning rate scheduler
  lr_scheduler: "linear_with_warmup"

  # Evaluation
  eval_steps: 500
  save_steps: 1000
  logging_steps: 100

  # Early stopping
  early_stopping_patience: 3
  early_stopping_threshold: 0.001

data:
  # Data paths
  train_file: "data/processed/train.csv"
  validation_file: "data/processed/validation.csv"
  test_file: "data/processed/test.csv"

  # Text processing
  max_sequence_length: 512
  tokenizer_type: "custom"  # Will train custom tokenizer

  # Data loading
  dataloader_num_workers: 4
  pin_memory: true

  # Augmentation
  data_augmentation:
    enabled: true
    synonym_replacement_prob: 0.1
    random_deletion_prob: 0.05
    random_insertion_prob: 0.05

hardware:
  # GPU configuration
  device: "auto"  # auto, cpu, cuda, mps
  mixed_precision: true  # Use FP16 training
  gradient_checkpointing: false

  # Multi-GPU
  use_ddp: false  # Distributed Data Parallel
  gpu_ids: [0]

  # Memory optimization
  gradient_accumulation_steps: 1
  dataloader_pin_memory: true

logging:
  # Experiment tracking
  use_wandb: true
  wandb_project: "skawr-search-ml"
  wandb_entity: null  # Will use default

  # Local logging
  output_dir: "models/checkpoints"
  logging_dir: "logs"

  # Checkpointing
  save_total_limit: 3  # Keep only 3 best checkpoints
  metric_for_best_model: "eval_loss"
  greater_is_better: false

inference:
  # Model serving
  batch_size: 64
  max_sequence_length: 512

  # Performance
  use_onnx: false  # Export to ONNX for faster inference
  quantization: false  # Model quantization

  # Caching
  enable_cache: true
  cache_size: 10000